<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | JMD Auto Care</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="icon" type="image/png" href="assets/jmd_logo.png" />
  <style>
    /* ── Login Page Specific Styles ── */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg-primary);
    }
    
    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 60px;
      position: relative;
    }

    .login-blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(26,140,255,0.2), transparent 70%);
      top: -100px; right: -100px;
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
    }
    .login-blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,212,255,0.15), transparent 70%);
      bottom: -100px; left: -100px;
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
    }

    .login-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 48px;
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 2;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-title {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input {
      background: var(--bg-surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      color: var(--text-primary);
      transition: var(--transition);
      outline: none;
    }

    .form-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(26,140,255,0.15);
    }

    .auth-btn {
      padding: 16px;
      font-size: 1rem;
      justify-content: center;
      margin-top: 8px;
      cursor: pointer;
    }

    .auth-switch {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .auth-switch a {
      color: var(--brand);
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    .error-msg {
      color: #EF4444;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
  
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar scrolled" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="nav-logo">
        <img src="assets/jmd_logo.png" alt="JMD Auto Care Logo" />
        <span class="nav-logo-text">JMD <span>AUTO CARE</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
      </ul>
    </div>
  </nav>

  <!-- LOGIN SECTION -->
  <div class="login-container">
    <div class="login-blob-1"></div>
    <div class="login-blob-2"></div>
    
    <div class="login-box" id="login-box">
      <div class="login-header">
        <h1 class="login-title" id="auth-title">Welcome Back</h1>
        <p class="login-subtitle" id="auth-subtitle">Sign in to your account</p>
      </div>

      <form class="auth-form" id="auth-form">
        <div class="form-group" id="name-group" style="display: none;">
          <label class="form-label" for="auth-name">Full Name</label>
          <input type="text" id="auth-name" class="form-input" placeholder="e.g. John Doe" />
        </div>
        <div class="form-group">
          <label class="form-label" for="auth-email">Email Address</label>
          <input type="email" id="auth-email" class="form-input" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="auth-password">Password</label>
          <input type="password" id="auth-password" class="form-input" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary auth-btn" id="auth-submit-btn">Sign In</button>
      </form>
      
      <div class="error-msg" id="auth-error"></div>

      <div class="auth-switch">
        <span id="auth-switch-text">Don't have an account?</span> 
        <a href="signup.html" id="auth-switch-link">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="supabase-client.js"></script>
  <script src="auth.js"></script>
</body>
</html>
